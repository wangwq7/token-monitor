name: Release

on:
  push:
    tags: ['v*']
  # Manual runs build the same artifacts from any branch (e.g. to test a macOS
  # build from a Windows dev machine) but skip the GitHub Release publish step.
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
            artifact_path: |
              dist/*.dmg
              dist/*.zip
          - os: windows-latest
            target: win
            artifact_path: dist/*.exe
          - os: ubuntu-latest
            target: linux
            artifact_path: dist/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Platform evidence
        run: node -p "process.platform + '-' + process.arch"
      - run: npm ci
      # APPIMAGE_EXTRACT_AND_RUN lets electron-builder's bundled appimagetool
      # run without libfuse2 (absent on the runners); a no-op on mac/win.
      # CSC_IDENTITY_AUTO_DISCOVERY=false keeps mac builds deterministically
      # unsigned instead of probing the runner keychain for an identity.
      - run: npm run dist:${{ matrix.target }}
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-${{ matrix.target }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.AppImage
          body_path: .github/RELEASE_TEMPLATE.md
